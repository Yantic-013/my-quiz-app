<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="manifest" id="manifestLink">
<title>刷题助手</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== 变量系统 (CSS Variables) ===== */
:root {
  --font-sans: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  
  --bg-page: #f8fafc;
  --bg-card: #ffffff;
  --bg-nav: rgba(255, 255, 255, 0.85);
  
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-light: #e0e7ff;
  
  --text-main: #0f172a;
  --text-sub: #64748b;
  --border-color: #e2e8f0;
  
  --correct: #10b981;
  --correct-bg: #ecfdf5;
  --correct-border: #a7f3d0;
  
  --wrong: #ef4444;
  --wrong-bg: #fef2f2;
  --wrong-border: #fecaca;
  
  --warning: #f59e0b;
  --warning-bg: #fffbeb;
  --warning-border: #fde68a;

  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body.dark {
  --bg-page: #0f172a;
  --bg-card: #1e293b;
  --bg-nav: rgba(30, 41, 59, 0.85);
  
  --primary: #6366f1;
  --primary-hover: #818cf8;
  --primary-light: #312e81;
  
  --text-main: #f8fafc;
  --text-sub: #94a3b8;
  --border-color: #334155;
  
  --correct: #34d399;
  --correct-bg: rgba(52, 211, 153, 0.1);
  --correct-border: rgba(52, 211, 153, 0.2);
  
  --wrong: #f87171;
  --wrong-bg: rgba(248, 113, 113, 0.1);
  --wrong-border: rgba(248, 113, 113, 0.2);
  
  --warning: #fbbf24;
  --warning-bg: rgba(251, 191, 36, 0.1);
  --warning-border: rgba(251, 191, 36, 0.2);

  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.5);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.2);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.3);
}

/* ===== 基础样式 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text-main);
  background: var(--bg-page);
  min-height: 100vh;
  transition: background-color var(--transition-normal), color var(--transition-normal);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }

/* ===== 导航栏 ===== */
.nav {
  background: var(--bg-nav);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 24px;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
  transition: background-color var(--transition-normal), border-color var(--transition-normal);
}
.nav-tabs {
  display: flex;
  justify-content: center;
  flex: 1;
}
.nav-item {
  padding: 18px 24px; cursor: pointer; color: var(--text-sub);
  border-bottom: 3px solid transparent; transition: all var(--transition-fast);
  font-size: 15px; font-weight: 500; user-select: none;
}
.nav-item:hover { color: var(--primary); }
.nav-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

.theme-toggle-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-sub);
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.theme-toggle-btn:hover {
  color: var(--primary);
  background: var(--primary-light);
  transform: rotate(15deg);
}

/* ===== 内容区 ===== */
.container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

/* ===== 卡片 ===== */
.card {
  background: var(--bg-card); border-radius: 16px; padding: 28px;
  box-shadow: var(--shadow-md); border: 1px solid var(--border-color);
  margin-bottom: 20px;
  transition: transform var(--transition-normal), box-shadow var(--transition-normal), background-color var(--transition-normal), border-color var(--transition-normal);
}
.card:hover {
  box-shadow: var(--shadow-lg);
}

/* ===== 按钮 ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 22px; border-radius: 10px;
  border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main);
  cursor: pointer; font-size: 14px; font-weight: 500; transition: all var(--transition-fast);
  user-select: none;
}
.btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.btn:active:not(:disabled) { transform: scale(0.96); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15); }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); color: #fff; box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3); }
.btn-danger { color: var(--wrong); border-color: var(--wrong); }
.btn-danger:hover:not(:disabled) { background: var(--wrong-bg); color: var(--wrong); border-color: var(--wrong); }
.btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }

/* ===== 表单 ===== */
.input, .select {
  padding: 10px 16px; border: 1px solid var(--border-color); border-radius: 10px;
  background: var(--bg-card); color: var(--text-main);
  font-size: 14px; outline: none; transition: all var(--transition-fast);
}
.input:focus, .select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

/* ===== 提示信息 ===== */
.msg { padding: 14px 20px; border-radius: 10px; margin-bottom: 16px; animation: slideInDown 0.3s ease-out; }
@keyframes slideInDown {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.msg-success { background: var(--correct-bg); border: 1px solid var(--correct-border); color: var(--correct); }
.msg-error { background: var(--wrong-bg); border: 1px solid var(--wrong-border); color: var(--wrong); }
.msg-info { background: var(--primary-light); border: 1px solid var(--border-color); color: var(--primary); }

/* ===== 选项按钮 ===== */
.options-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-top: 20px;
}
.options-grid.single-col { grid-template-columns: 1fr; }

.option-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border: 2px solid var(--border-color); border-radius: 12px;
  cursor: pointer; transition: all var(--transition-fast); background: var(--bg-card);
  text-align: left; font-size: 15px; font-weight: 500; line-height: 1.6;
  color: var(--text-main); position: relative; overflow: hidden;
}
.option-btn:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.option-btn:active { transform: translateY(0) scale(0.98); }
.option-btn.selected { border-color: var(--primary); background: var(--primary-light); }
.option-btn.correct { border-color: var(--correct); background: var(--correct-bg); }
.option-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
.option-letter {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--border-color); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; flex-shrink: 0; color: var(--text-sub);
  transition: all var(--transition-fast);
}
.option-btn.selected .option-letter { background: var(--primary); color: #fff; }
.option-btn.correct .option-letter { background: var(--correct); color: #fff; }
.option-btn.wrong .option-letter { background: var(--wrong); color: #fff; }

/* ===== 章节列表 ===== */
.chapter-list { display: flex; flex-direction: column; gap: 10px; }
.chapter-item {
  padding: 16px 20px; border: 1px solid var(--border-color); border-radius: 12px;
  cursor: pointer; transition: all var(--transition-fast); display: flex; justify-content: space-between;
  align-items: center; background: var(--bg-card); color: var(--text-main);
}
.chapter-item:hover { border-color: var(--primary); background: var(--primary-light); transform: translateX(4px); }
.chapter-item.active { border-color: var(--primary); background: var(--primary-light); }
.chapter-badge { font-size: 13px; color: var(--text-sub); font-weight: 500; }

/* ===== 统计行 ===== */
.stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
.stat-item {
  flex: 1 1 150px; background: var(--bg-page); border: 1px solid var(--border-color);
  border-radius: 12px; padding: 16px; text-align: center; transition: all var(--transition-fast);
}
.stat-item:hover { border-color: var(--primary); transform: translateY(-2px); }
.stat-num { font-size: 32px; font-weight: 700; color: var(--primary); font-family: 'Outfit', sans-serif; }
.stat-label { font-size: 13px; color: var(--text-sub); margin-top: 6px; font-weight: 500; }

/* ===== 题目导航 ===== */
.quiz-nav-sidebar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 16px 0; margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
}
.quiz-nav-dot {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid var(--border-color);
  transition: all var(--transition-fast); background: var(--bg-card); color: var(--text-sub);
}
.quiz-nav-dot:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.08); }
.quiz-nav-dot.answered { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.quiz-nav-dot.current { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; box-shadow: 0 0 10px rgba(79, 70, 229, 0.4); }

/* ===== 测验头部 ===== */
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.quiz-progress { color: var(--text-sub); font-size: 13px; font-weight: 500; }
.explanation { margin-top: 20px; padding: 16px 20px; background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 12px; font-size: 14px; line-height: 1.6; color: var(--text-main); }

/* ===== 文件上传区 ===== */
.upload-zone {
  border: 2px dashed var(--border-color); border-radius: 14px; padding: 48px;
  text-align: center; cursor: pointer; transition: all var(--transition-fast); background: var(--bg-page);
}
.upload-zone:hover { border-color: var(--primary); background: var(--primary-light); }
.upload-zone p { color: var(--text-sub); margin-top: 12px; font-size: 14px; }

/* ===== 隐藏 ===== */
.hidden { display: none !important; }

/* ===== 弹窗 ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15, 23, 42, 0.5); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-card); border-radius: 16px; padding: 28px;
  min-width: 340px; max-width: 480px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-color);
  animation: scaleIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-main); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* ===== 标签 ===== */
.tag {
  display: inline-block; padding: 4px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 600; margin-right: 6px;
}
.tag-single { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
.tag-multi { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

/* ===== 答题结果 ===== */
.result-opt { display: inline-block; padding: 6px 12px; margin: 4px; border-radius: 8px; font-size: 13px; background: var(--bg-page); border: 1px solid var(--border-color); color: var(--text-main); }
.result-opt.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct); }
.result-opt.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong); }

.result-item {
  padding: 16px 20px; border: 1px solid var(--border-color); border-radius: 12px;
  background: var(--bg-card); margin-bottom: 12px; cursor: pointer; transition: all var(--transition-fast);
}
.result-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.result-item.correct-item { border-color: var(--correct-border); background: var(--correct-bg); }
.result-item.wrong-item { border-color: var(--wrong-border); background: var(--wrong-bg); }

.result-item .result-detail { display: none; }
.result-item.expanded .result-detail { display: block; }
.result-item.expanded .result-arrow { transform: rotate(90deg); }

.error-item {
  padding: 16px 20px; border: 1px solid var(--border-color); border-radius: 12px;
  background: var(--bg-card); margin-bottom: 12px; cursor: pointer; transition: all var(--transition-fast);
}
.error-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary); }
.error-item .error-detail { display: none; }
.error-item.expanded .error-detail { display: block; }
.error-item.expanded .result-arrow { transform: rotate(90deg); }

.exam-chk { accent-color: var(--primary); width: 16px; height: 16px; margin-right: 8px; vertical-align: middle; }

/* ===== 分段选择器 ===== */
.segmented-control {
  display: inline-flex;
  background: var(--bg-page);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border-color);
  gap: 4px;
}
.segment-btn {
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  color: var(--text-sub);
  user-select: none;
}
.segment-btn:hover {
  color: var(--primary);
}
.segment-btn.active {
  background: var(--bg-card);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.exam-chapter-label {
  display: inline-flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-page);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-main);
  user-select: none;
}
.exam-chapter-label:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}
.exam-chapter-label input[type="checkbox"] {
  margin-right: 8px;
  accent-color: var(--primary);
}

.info-alert {
  background: var(--warning-bg);
  border: 1px solid var(--warning-border);
  color: var(--text-main);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 14px;
  line-height: 1.6;
}

/* ===== 响应式 ===== */
@media (max-width: 640px) {
  .nav { padding: 0 12px; }
  .nav-item { padding: 14px 12px; font-size: 13px; }
  .options-grid { grid-template-columns: 1fr; gap: 12px; }
  .container { padding: 20px 12px; }
  .card { padding: 20px; }
  .stats-row { gap: 12px; }
  .stat-item { flex: 1 1 120px; padding: 12px; }
  .stat-num { font-size: 26px; }
}
</style>

<!-- 导航栏 -->
<nav class="nav" id="navBar">
  <div class="nav-tabs">
    <div class="nav-item active" data-page="practice">章节练习</div>
    <div class="nav-item" data-page="exam-config">模拟考试</div>
    <div class="nav-item" data-page="errors">错题集</div>
    <div class="nav-item" data-page="manage">题库管理</div>
  </div>
  <button class="theme-toggle-btn" id="themeToggleBtn" title="切换主题">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</nav>

<!-- 内容区 -->
<div class="container" id="container"></div>

<script>
/* ================================================================
   数据层
   ================================================================ */
function $id(id) { return document.getElementById(id); }

// localforage 降级垫片逻辑，防止 CDN 加载失败报错
if (typeof localforage === 'undefined') {
  console.warn('localforage is not defined. Falling back to localStorage.');
  window.localforage = {
    getItem: function(key) {
      return new Promise((resolve) => {
        try {
          const val = localStorage.getItem(key);
          resolve(val ? JSON.parse(val) : null);
        } catch {
          resolve(null);
        }
      });
    },
    setItem: function(key, val) {
      return new Promise((resolve) => {
        try {
          localStorage.setItem(key, JSON.stringify(val));
        } catch {}
        resolve(val);
      });
    },
    removeItem: function(key) {
      return new Promise((resolve) => {
        try {
          localStorage.removeItem(key);
        } catch {}
        resolve();
      });
    }
  };
}

async function loadData(key) {
  try {
    const val = await localforage.getItem(key);
    return val;
  } catch {
    return null;
  }
}

async function saveData(key, data) {
  try {
    await localforage.setItem(key, data);
  } catch (e) {
    console.error(`Error saving data for ${key}:`, e);
  }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questionBank = [];
let errorBook = [];
let settings = {};

// 异步加载与历史迁移
async function initData() {
  try {
    let qb = await loadData('questionBank');
    let eb = await loadData('errorBook');
    let setts = await loadData('settings');

    // 如果 IndexedDB 没有数据，但 localStorage 中有旧数据，则执行无缝迁移
    let migrated = false;
    if (!qb && localStorage.getItem('questionBank')) {
      try {
        qb = JSON.parse(localStorage.getItem('questionBank')) || [];
        migrated = true;
      } catch (e) {}
    }
    if (!eb && localStorage.getItem('errorBook')) {
      try {
        eb = JSON.parse(localStorage.getItem('errorBook')) || [];
        migrated = true;
      } catch (e) {}
    }
    if (!setts && localStorage.getItem('settings')) {
      try {
        setts = JSON.parse(localStorage.getItem('settings')) || {};
        migrated = true;
      } catch (e) {}
    }

    questionBank = qb || [];
    errorBook = eb || [];
    settings = setts || {};

    if (migrated) {
      console.log('Migrated old localStorage data to IndexedDB.');
      await persist();
    }
  } catch (err) {
    console.error("Failed to initialize data from IndexedDB:", err);
  }
}

async function persist() {
  await saveData('questionBank', questionBank);
  await saveData('errorBook', errorBook);
  await saveData('settings', settings);
}

/* ================================================================
   导航
   ================================================================ */
let currentPage = 'practice';
let currentTab = 'practice'; // 'practice' or 'memorize'

document.getElementById('navBar').addEventListener('click', function(e) {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  item.classList.add('active');
  currentPage = item.dataset.page;
  currentTab = 'practice';
  renderPage();
});

/* ================================================================
   页面渲染入口
   ================================================================ */
function renderPage() {
  const c = $id('container');
  switch (currentPage) {
    case 'practice': renderChapterList(c); break;

    case 'errors': renderErrorBook(c); break;

  }
}

/* ================================================================
   Excel 导入
   ================================================================ */
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      showImportMsg('info', '正在解析并保存数据，请稍候...');
      // 允许 UI 渲染提示消息
      await new Promise(resolve => setTimeout(resolve, 50));

      const wb = XLSX.read(evt.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 2) {
        showImportMsg('error', 'Excel 文件为空或格式不正确');
        return;
      }

      const headers = rows[0].map(h => String(h).trim());
      const chapterIdx = headers.findIndex(h => h === '章节');
      const typeIdx = headers.findIndex(h => h === '题型');
      const questionIdx = headers.findIndex(h => h === '题目');
      const answerIdx = headers.findIndex(h => h === '正确答案');
      const explainIdx = headers.findIndex(h => h === '解析');

      // 查找所有选项列（匹配"选项A"到"选项Z"）
      const optionIndices = [];
      headers.forEach((h, i) => {
        const m = h.match(/^选项([A-Z])$/);
        if (m) optionIndices.push(i);
      });

      if (chapterIdx === -1 || typeIdx === -1 || questionIdx === -1 || answerIdx === -1) {
        showImportMsg('error', '缺少必填列：章节、题型、题目、正确答案');
        return;
      }
      if (optionIndices.length < 4) {
        showImportMsg('error', '选项列至少需要4列（选项A~选项D）');
        return;
      }

      let newCount = 0, skipCount = 0;
      // 构建已有题目指纹用于去重
      const existingKeys = new Set(
        questionBank.map(q => q.chapter + '|||' + q.question)
      );

      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        const chapter = String(row[chapterIdx] || '').trim();
        const typeStr = String(row[typeIdx] || '').trim();
        const question = String(row[questionIdx] || '').trim();

        if (!chapter || !typeStr || !question) continue;

        const key = chapter + '|||' + question;
        if (existingKeys.has(key)) { skipCount++; continue; }
        existingKeys.add(key);

        // 收集非空选项
        const options = [];
        const optionMap = {}; // letter -> index
        for (const oi of optionIndices) {
          const val = String(row[oi] || '').trim();
          if (val) {
            const letter = headers[oi].replace('选项', '');
            optionMap[letter] = options.length;
            options.push(val);
          }
        }

        // 解析正确答案
        const answerRaw = String(row[answerIdx] || '').trim().toUpperCase();
        if (!answerRaw) continue;
        const answers = answerRaw.split(/[,，]/).map(s => s.trim()).filter(Boolean);

        const type = (typeStr === '多选') ? 'multi' : 'single';

        // 验证答案有效性
        const validAnswers = answers.filter(a => optionMap.hasOwnProperty(a));
        if (validAnswers.length === 0) continue;

        const qObj = {
          id: genId(),
          chapter,
          type,
          question,
          options,
          answer: validAnswers,
          explanation: explainIdx >= 0 ? String(row[explainIdx] || '').trim() : ''
        };

        questionBank.push(qObj);
        newCount++;
      }

      await persist();
      showImportMsg('success', `导入成功！新增 ${newCount} 题，跳过 ${skipCount} 题（重复或格式问题）`);
      setTimeout(() => renderPage(), 800);
    } catch (err) {
      showImportMsg('error', '解析失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showImportMsg(type, text) {
  const el = $id('importMsg');
  if (el) el.innerHTML = `<div class="msg msg-${type}">${esc(text)}</div>`;

/* ================================================================
   刷题模式（全部答完统一判分）
   ================================================================ */
let quizState = null;

function startQuiz(questions, chapter) {
  // 预生成每道题的随机选项顺序（保证前后翻页选项位置不变）
  // 字母始终按显示位置重新编排：第一个位置就是A，第二个就是B...
  const prepared = questions.map(q => {
    const mapped = q.options.map((text, i) => ({ text, originalLetter: String.fromCharCode(65 + i) }));
    const shuffled = shuffle(mapped);
    const letterMap = {}; // 显示字母 → 原始字母
    const displayOptions = shuffled.map((item, i) => {
      const displayLetter = String.fromCharCode(65 + i);
      letterMap[displayLetter] = item.originalLetter;
      return { text: item.text, letter: displayLetter };
    });
    return { ...q, displayOptions, letterMap };
  });

  quizState = {
    questions: prepared,
    answers: new Array(prepared.length).fill(null), // 每题存储选中的字母数组，null=未答
    currentIndex: 0,
    chapter: chapter,
    mode: 'practice',
    submitted: false
  };
  renderQuizCard();
}

function renderQuizCard() {
  const total = quizState.questions.length;
  const idx = quizState.currentIndex;
  const q = quizState.questions[idx];
  const isMulti = q.type === 'multi';
  const gridClass = q.displayOptions.length > 4 ? 'single-col' : '';
  const selected = quizState.answers[idx] || [];
  const answeredCount = quizState.answers.filter(a => a !== null && a.length > 0).length;

  // 题目导航按钮
  let navHtml = '<div class="quiz-nav-sidebar">';
  for (let i = 0; i < total; i++) {
    const cls = i === idx ? 'current' : (quizState.answers[i] && quizState.answers[i].length > 0 ? 'answered' : '');
    navHtml += `<span class="quiz-nav-dot ${cls}" data-idx="${i}">${i + 1}</span>`;
  }
  navHtml += '</div>';

  $id('container').innerHTML = `
    <div class="card">
      <div class="quiz-header">
        <span class="tag ${q.type === 'multi' ? 'tag-multi' : 'tag-single'}">${q.type === 'multi' ? '多选题' : '单选题'}</span>
        <span class="quiz-progress">第 ${idx + 1} 题 / 共 ${total} 题 · 已答 ${answeredCount} 题</span>
      </div>

      ${navHtml}

      <p style="font-size:16px; line-height:1.8; margin:12px 0;">${esc(q.question)}</p>

      <div class="options-grid ${gridClass}" id="optionsGrid">
        ${q.displayOptions.map(opt => `
          <div class="option-btn ${selected.includes(opt.letter) ? 'selected' : ''}" data-letter="${opt.letter}">
            <span class="option-letter">${opt.letter}</span>
            <span>${esc(opt.text)}</span>
          </div>
        `).join('')}
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px">
        <button class="btn" id="btnPrev" ${idx === 0 ? 'disabled' : ''}>上一题</button>
        <span style="color:var(--text-sub); font-size:13px; font-weight:500;">${isMulti ? '点击选项可切换选中/取消' : '点击选项选中答案'}</span>
        ${idx < total - 1
          ? '<button class="btn btn-primary" id="btnNext">下一题</button>'
          : '<button class="btn btn-primary" id="btnSubmit">交卷</button>'
        }
      </div>
    </div>
  `;

  // 处理选项点击
  const grid = $id('optionsGrid');
  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.option-btn');
    if (!btn) return;
    const letter = btn.dataset.letter;

    if (isMulti) {
      let sel = quizState.answers[idx] || [];
      if (sel.includes(letter)) {
        sel = sel.filter(l => l !== letter);
      } else {
        sel = [...sel, letter];
      }
      quizState.answers[idx] = sel.length > 0 ? sel : null;
      btn.classList.toggle('selected');
    } else {
      quizState.answers[idx] = [letter];
      // 单选题：选中后自动跳下一题（最后一题停留让用户交卷）
      if (idx < quizState.questions.length - 1) {
        quizState.currentIndex++;
      }
      renderQuizCard();
    }
  });

  // 题目导航点击
  document.querySelectorAll('.quiz-nav-dot').forEach(dot => {
    dot.addEventListener('click', function() {
      quizState.currentIndex = parseInt(this.dataset.idx);
      renderQuizCard();
    });
  });

  $id('btnPrev').addEventListener('click', () => { quizState.currentIndex--; renderQuizCard(); });
  if (idx < total - 1) {
    $id('btnNext').addEventListener('click', () => { quizState.currentIndex++; renderQuizCard(); });
  } else {
    $id('btnSubmit').addEventListener('click', () => {
      const unanswered = quizState.answers.filter(a => !a || a.length === 0).length;
      let msg = '确定要交卷吗？';
      if (unanswered > 0) msg += `\n还有 ${unanswered} 题未作答，交卷后未答题将计为错误。`;
      if (confirm(msg)) submitQuiz();
    });
  }
}

function submitQuiz() {
  quizState.submitted = true;
  let correct = 0, wrong = 0;
  const results = quizState.questions.map((q, i) => {
    const userDisplayLetters = quizState.answers[i] || [];
    // 将显示字母转为原始字母，再与正确答案对比
    const userAnswer = userDisplayLetters.map(l => q.letterMap ? q.letterMap[l] : l);
    const sortedUser = [...userAnswer].sort();
    const sortedCorrect = [...q.answer].sort();
    const isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
    if (isCorrect) { correct++; } else { wrong++; addToErrorBook(q.id); }
    return { ...q, userAnswer, isCorrect, userDisplayLetters };
  });

  quizState.correct = correct;
  quizState.wrong = wrong;
  quizState.results = results;

  showQuizResult(results);
}

function showQuizResult(results) {
  const total = results.length;
  const correct = quizState.correct;
  const wrong = quizState.wrong;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;

  let detailHtml = results.map((r, i) => {
    const reverseMap = {};
    if (r.letterMap) {
      for (const [dl, ol] of Object.entries(r.letterMap)) { reverseMap[ol] = dl; }
    }
    const correctDisplay = r.answer.map(a => reverseMap[a] || a).sort().join(', ');
    const userDisplay = (r.userDisplayLetters && r.userDisplayLetters.length > 0)
      ? r.userDisplayLetters.sort().join(', ') : '未作答';
    const statusIcon = r.isCorrect ? '✅' : '❌';
    const statusColor = r.isCorrect ? 'var(--correct)' : 'var(--wrong)';
    const itemClass = r.isCorrect ? 'correct-item' : 'wrong-item';

    // 选项列表（标注正确答案和用户选择）
    const optionsDetail = r.displayOptions.map(opt => {
      const isCorrectOpt = r.answer.includes(r.letterMap ? r.letterMap[opt.letter] || opt.letter : opt.letter);
      const isUserPick = (r.userDisplayLetters || []).includes(opt.letter);
      let cls = '';
      if (isCorrectOpt && isUserPick) cls = 'correct';
      else if (isUserPick && !isCorrectOpt) cls = 'wrong';
      else if (isCorrectOpt) cls = 'correct';
      return `<span class="result-opt ${cls}">${opt.letter}. ${esc(opt.text)}</span>`;
    }).join(' ');

    return `
      <div class="result-item collapsed ${itemClass}" data-idx="${i}">
        <div class="result-summary" style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
          <span style="flex:1; min-width:0;">
            <strong>${statusIcon} ${i + 1}.</strong>
            <span class="tag ${r.type === 'multi' ? 'tag-multi' : 'tag-single'}" style="margin:0 4px;">${r.type === 'multi' ? '多选' : '单选'}</span>
            <span style="color:var(--text-main); font-weight:500;">${esc(r.question)}</span>
          </span>
          <span style="flex-shrink:0; font-size:13px; font-weight:600; color:${statusColor};">${r.isCorrect ? '✓' : '✗'} ${userDisplay}</span>
          <span class="result-arrow" style="flex-shrink:0; font-size:12px; color:var(--text-sub); transition:transform 0.2s;">▶</span>
        </div>
        <div class="result-detail" style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border-color); font-size:13px; color:var(--text-sub);">
          <div style="margin-bottom:8px;"><strong>选项：</strong>${optionsDetail}</div>
          <div style="margin-bottom:6px; color:var(--text-main);">你的答案：<strong style="color:${statusColor}">${userDisplay}</strong></div>
          ${!r.isCorrect ? `<div style="margin-bottom:6px; color:var(--text-main);">正确答案：<strong style="color:var(--correct)">${correctDisplay}</strong></div>` : ''}
          ${r.explanation ? `<div class="explanation" style="margin-top:8px"><strong>解析：</strong>${esc(r.explanation)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  $id('container').innerHTML = `
    <div class="card" style="text-align:center">
      <div style="font-size:48px; margin-bottom:16px">${pct >= 60 ? '🎉' : '💪'}</div>
      <h2 style="font-size:22px; font-weight:700;">${quizState.chapter} · 答题结果</h2>
      <div class="stats-row" style="justify-content:center; margin:24px 0">
        <div class="stat-item">
          <div class="stat-num">${total}</div>
          <div class="stat-label">总题数</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--correct)">${correct}</div>
          <div class="stat-label">正确</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--wrong)">${wrong}</div>
          <div class="stat-label">错误</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${pct}%</div>
          <div class="stat-label">正确率</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:18px; font-weight:700; margin-bottom:16px">答题详情</h3>
      ${detailHtml}
    </div>

    <div style="text-align:center; margin-top:20px;">
      <button class="btn btn-primary" id="btnBack">返回章节列表</button>
    </div>
  `;
  $id('btnBack').addEventListener('click', () => { currentPage = 'practice'; renderPage(); });
}

/* ================================================================
   背题模式
   ================================================================ */
let memorizeState = null;

function startMemorize(questions, chapter) {
  memorizeState = {
    questions: questions,
    currentIndex: 0,
    chapter: chapter
  };
  renderMemorizeCard();
}

function renderMemorizeCard() {
  const total = memorizeState.questions.length;
  const idx = memorizeState.currentIndex;
  if (idx >= total) {
    $id('container').innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:48px; margin-bottom:16px">✅</div>

        <button class="btn btn-primary" id="btnBack" style="margin-top:16px">返回章节列表</button>
      </div>`;
    $id('btnBack').addEventListener('click', () => { currentPage = 'practice'; renderPage(); });
    return;
  }

  const q = memorizeState.questions[idx];
  const answerLabels = q.answer.map(a => `${a}. ${q.options[q.options.findIndex((_, i) => String.fromCharCode(65 + i) === a)]}`).join('<br>');

  $id('container').innerHTML = `
    <div class="card">
      <div class="quiz-header">
        <span class="tag tag-multi">背题模式</span>
        <span class="quiz-progress">${idx + 1} / ${total}</span>
      </div>

      <p style="font-size:16px; line-height:1.8; margin-bottom:16px;">${esc(q.question)}</p>

      <div class="options-grid">
        ${q.options.map((opt, i) => {
          const letter = String.fromCharCode(65 + i);
          const isAnswer = q.answer.includes(letter);
          return `<div class="option-btn ${isAnswer ? 'correct' : ''}" style="pointer-events:none; cursor:default;">
            <span class="option-letter">${letter}</span>
            <span>${esc(opt)}</span>
          </div>`;
        }).join('')}
      </div>

      ${q.explanation ? `<div class="explanation" style="margin-top:12px"><strong>解析：</strong>${esc(q.explanation)}</div>` : ''}

      <div style="display:flex; justify-content:space-between; margin-top:16px">
        <button class="btn" id="btnPrev" ${idx === 0 ? 'disabled' : ''}>上一题</button>
        <button class="btn btn-primary" id="btnNext">${idx + 1 >= total ? '完成浏览' : '下一题'}</button>
      </div>
    </div>
  `;

  $id('btnPrev').addEventListener('click', () => { memorizeState.currentIndex--; renderMemorizeCard(); });
  $id('btnNext').addEventListener('click', () => { memorizeState.currentIndex++; renderMemorizeCard(); });
}

/* ================================================================
   错题集
   ================================================================ */
function renderErrorBook(container) {
  // 清理无关联题目的无效错题记录
  const before = errorBook.length;
  errorBook = errorBook.filter(e => questionBank.some(q => q.id === e.questionId));
  if (errorBook.length !== before) persist();

  if (errorBook.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center; padding:60px 24px;">
        <div style="font-size:48px; margin-bottom:16px">📝</div>
        <p style="color:var(--text-sub); font-size:16px;">错题集为空，继续加油！</p>
      </div>`;
    return;
  }

  const chapters = [...new Set(
    errorBook.map(e => {
      const q = questionBank.find(q => q.id === e.questionId);
      return q ? q.chapter : '(已删除)';
    })
  )];

  const filterHtml = `
    <select class="select" id="errorFilter">
      <option value="all">全部章节</option>
      ${chapters.map(ch => `<option value="${escAttr(ch)}">${esc(ch)}</option>`).join('')}
    </select>
    <button class="btn btn-primary btn-sm" id="btnRetryAll" style="margin-left:12px">重新练习全部</button>
  `;

  container.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px">
        <h2 style="font-size:20px; font-weight:700;">错题集 · ${errorBook.length} 题</h2>
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">${filterHtml}</div>
      </div>
      <div id="errorList"></div>
    </div>
  `;

  function renderList(filter = 'all') {
    const list = $id('errorList');
    const filtered = errorBook.filter(e => {
      const q = questionBank.find(q => q.id === e.questionId);
      if (!q) return false;
      if (filter !== 'all' && q.chapter !== filter) return false;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<p style="color:var(--text-sub); text-align:center; padding:20px">该章节暂无错题</p>';
      return;
    }

    list.innerHTML = filtered.map(e => {
      const q = questionBank.find(q => q.id === e.questionId);
      if (!q) return '';
      const answerStr = q.answer.join(', ');

      // 生成选项列表（标注正确答案）
      const optionsDetail = q.options.map((opt, idx) => {
        const letter = String.fromCharCode(65 + idx);
        const isCorrectOpt = q.answer.includes(letter);
        let cls = isCorrectOpt ? 'correct' : '';
        return `<span class="result-opt ${cls}">${letter}. ${esc(opt)}</span>`;
      }).join(' ');

      return `<div class="error-item collapsed" style="display:flex; flex-direction:column; gap:8px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
          <span style="font-weight:600; line-height:1.5;">${esc(q.question)}</span>
          <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
            <span class="tag tag-multi">错误 ${e.wrongCount} 次</span>
            <span class="result-arrow" style="font-size:12px; color:var(--text-sub); transition:transform 0.2s;">▶</span>
          </div>
        </div>
        <div style="font-size:13px; color:var(--text-sub); font-weight:500;">
          正确答案：<strong style="color:var(--correct)">${answerStr}</strong> · 章节：${esc(q.chapter)}
          <button class="btn btn-sm btn-danger" style="margin-left:8px; padding:3px 8px; font-size:11px;" data-id="${q.id}" data-action="remove">移除</button>
        </div>
        <div class="error-detail" style="margin-top:8px; padding-top:12px; border-top:1px solid var(--border-color); font-size:13px; color:var(--text-sub);">
          <div style="margin-bottom:8px;"><strong>选项：</strong>${optionsDetail}</div>
          ${q.explanation ? `<div class="explanation" style="margin-top:8px"><strong>解析：</strong>${esc(q.explanation)}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    // 移除按钮事件
    list.querySelectorAll('[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', async function() {
        errorBook = errorBook.filter(e => e.questionId !== this.dataset.id);
        await persist();
        renderList($id('errorFilter').value);
      });
    });
  }

  renderList();
  $id('errorFilter').addEventListener('change', function() { renderList(this.value); });
  $id('btnRetryAll').addEventListener('click', () => {
    const ids = errorBook.map(e => e.questionId);
    const questions = ids.map(id => questionBank.find(q => q.id === id)).filter(Boolean);
    if (questions.length === 0) { alert('没有可练习的错题'); return; }
    startQuiz(questions, '错题重练');
  });
}

/* ================================================================
   模拟考试
   ================================================================ */
function renderExamConfig(container) {
  const chapters = getChapters();
  if (chapters.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center; padding:60px 24px;">
        <p style="color:var(--text-sub); font-size:16px;">还没有题目，请先到「题库管理」导入题库</p>
      </div>`;
    return;
  }

  const totalSingle = questionBank.filter(q => q.type === 'single').length;
  const totalMulti = questionBank.filter(q => q.type === 'multi').length;

  container.innerHTML = `
    <div class="card">
      <h2 style="font-size:20px; font-weight:700; margin-bottom:20px;">模拟考试配置</h2>

      <div style="margin-bottom:24px">
        <p style="margin-bottom:12px; font-weight:600">选择章节：</p>
        <div id="examChapters" style="display:flex; flex-wrap:wrap; gap:10px">
          ${chapters.map(ch => {
            const single = questionBank.filter(q => q.chapter === ch && q.type === 'single').length;
            const multi = questionBank.filter(q => q.chapter === ch && q.type === 'multi').length;
            return `<label class="exam-chapter-label">
              <input type="checkbox" value="${escAttr(ch)}" class="exam-chk" checked>
              <span>${esc(ch)}</span> <span class="chapter-badge" style="margin-left:6px; font-size:11px;">(单${single}/多${multi})</span>
            </label>`;
          }).join('')}
        </div>
        <div style="margin-top:12px; display:flex; gap:8px;">
          <button class="btn btn-sm" id="btnSelectAll">全选</button>
          <button class="btn btn-sm" id="btnDeselectAll">取消全选</button>
        </div>
      </div>

      <div style="display:flex; gap:24px; margin-bottom:24px; flex-wrap:wrap">
        <div>
          <label style="font-weight:600; margin-right:8px;">单选题数：</label>
          <input type="number" class="input" id="examSingleCount" value="${Math.min(10, totalSingle)}" min="0" max="${totalSingle}" style="width:100px">
        </div>
        <div>
          <label style="font-weight:600; margin-right:8px;">多选题数：</label>
          <input type="number" class="input" id="examMultiCount" value="${Math.min(5, totalMulti)}" min="0" max="${totalMulti}" style="width:100px">
        </div>
      </div>

      <p style="color:var(--text-sub); font-size:13px; margin-bottom:20px; font-weight:500;">
        题库共有：单选 <strong>${totalSingle}</strong> 题 · 多选 <strong>${totalMulti}</strong> 题
        <span id="availableHint"></span>
      </p>

      <button class="btn btn-primary" id="btnStartExam">开始考试</button>
    </div>
  `;

  function updateHint() {
    const selectedChs = [...document.querySelectorAll('.exam-chk:checked')].map(cb => cb.value);
    const availSingle = questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'single').length;
    const availMulti = questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'multi').length;
    const hint = $id('availableHint');
    if (hint) hint.textContent = ` · 已选章节可用：单选 ${availSingle} 题 · 多选 ${availMulti} 题`;
  }

  updateHint();
  document.getElementById('examChapters').addEventListener('change', updateHint);
  $id('btnSelectAll').addEventListener('click', () => {
    document.querySelectorAll('.exam-chk').forEach(cb => cb.checked = true);
    updateHint();
  });
  $id('btnDeselectAll').addEventListener('click', () => {
    document.querySelectorAll('.exam-chk').forEach(cb => cb.checked = false);
    updateHint();
  });

  $id('btnStartExam').addEventListener('click', () => {
    const selectedChs = [...document.querySelectorAll('.exam-chk:checked')].map(cb => cb.value);
    if (selectedChs.length === 0) { alert('请至少选择一个章节'); return; }

    const singleCount = parseInt($id('examSingleCount').value) || 0;
    const multiCount = parseInt($id('examMultiCount').value) || 0;
    if (singleCount === 0 && multiCount === 0) { alert('请至少设置一种题型的数量'); return; }

    const poolSingle = shuffle(questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'single'));
    const poolMulti = shuffle(questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'multi'));

    if (singleCount > poolSingle.length) {
      alert(`单选题不足！需要 ${singleCount} 题，但只有 ${poolSingle.length} 题可用`);
      return;
    }
    if (multiCount > poolMulti.length) {
      alert(`多选题不足！需要 ${multiCount} 题，但只有 ${poolMulti.length} 题可用`);
      return;
    }

    const examQuestions = shuffle([
      ...poolSingle.slice(0, singleCount),
      ...poolMulti.slice(0, multiCount)
    ]);

    startQuiz(examQuestions, '模拟考试');
  });
}

/* ================================================================
   工具函数
   ================================================================ */
function countValidErrors() {
  return errorBook.filter(e => questionBank.some(q => q.id === e.questionId)).length;
}

function getChapters() {
  return [...new Set(questionBank.map(q => q.chapter))].sort();
}

function addToErrorBook(questionId) {
  const entry = errorBook.find(e => e.questionId === questionId);
  if (entry) {
    entry.wrongCount++;
    entry.lastWrong = new Date().toISOString().slice(0, 10);
  } else {
    errorBook.push({
      questionId,
      wrongCount: 1,
      lastWrong: new Date().toISOString().slice(0, 10)
    });
  }
  persist();
}

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 主题切换与初始化函数
function initTheme() {
  const btn = $id('themeToggleBtn');
  if (!btn) return;
  
  let theme = settings.theme;
  if (!theme) {
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  
  applyTheme(theme);
  
  btn.addEventListener('click', async () => {
    const currentTheme = document.body.classList.contains('dark') ? 'dark' : 'light';
    const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme(nextTheme);
    settings.theme = nextTheme;
    await persist();
  });
}

function applyTheme(theme) {
  const btn = $id('themeToggleBtn');
  if (!btn) return;
  if (theme === 'dark') {
    document.body.classList.add('dark');
    btn.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    `;
    btn.setAttribute('title', '切换至亮色模式');
  } else {
    document.body.classList.remove('dark');
    btn.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    `;
    btn.setAttribute('title', '切换至暗色模式');
  }
}

// 全局事件委托：答题结果与错题展开/收起
$id('container').addEventListener('click', function(e) {
  // 1. 处理答题结果卡片展开/收起
  const resultItem = e.target.closest('.result-item');
  if (resultItem) {
    resultItem.classList.toggle('expanded');
    return;
  }
  
  // 2. 处理错题卡片展开/收起（排除点击“移除”按钮）
  const errorItem = e.target.closest('.error-item');
  if (errorItem && !e.target.closest('button')) {
    errorItem.classList.toggle('expanded');
    return;
  }
});
