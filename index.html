<style>
/* ===== Google Fonts ===== */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

/* ===== 变量系统 (CSS Variables) ===== */
:root {
  --font-sans: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;

  /* Backgrounds */
  --bg-page: #f0f4ff;
  --bg-card: #ffffff;
  --bg-nav: rgba(255, 255, 255, 0.82);
  --bg-card-hover: #fafbff;

  /* Primary gradient palette */
  --primary: #5b5ef4;
  --primary-2: #7c3aed;
  --primary-hover: #4338ca;
  --primary-light: #eef0ff;
  --primary-glow: rgba(91, 94, 244, 0.18);

  /* Gradient definitions */
  --grad-primary: linear-gradient(135deg, #5b5ef4 0%, #7c3aed 100%);
  --grad-primary-soft: linear-gradient(135deg, rgba(91,94,244,0.12) 0%, rgba(124,58,237,0.08) 100%);
  --grad-hero: linear-gradient(160deg, #5b5ef4 0%, #7c3aed 50%, #a855f7 100%);
  --grad-correct: linear-gradient(135deg, #10b981 0%, #059669 100%);
  --grad-wrong: linear-gradient(135deg, #f43f5e 0%, #dc2626 100%);

  /* Text */
  --text-main: #0d1117;
  --text-sub: #64748b;
  --text-muted: #94a3b8;

  /* Borders */
  --border-color: #e1e8ff;
  --border-strong: #c7d2fe;

  /* Status */
  --correct: #10b981;
  --correct-bg: #ecfdf5;
  --correct-border: #a7f3d0;
  --correct-glow: rgba(16,185,129,0.15);

  --wrong: #f43f5e;
  --wrong-bg: #fff1f2;
  --wrong-border: #fda4af;
  --wrong-glow: rgba(244,63,94,0.15);

  --warning: #f59e0b;
  --warning-bg: #fffbeb;
  --warning-border: #fde68a;

  /* Shadows */
  --shadow-xs: 0 1px 3px rgba(91,94,244,0.06);
  --shadow-sm: 0 2px 8px rgba(91,94,244,0.08), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 24px rgba(91,94,244,0.10), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 20px 48px rgba(91,94,244,0.14), 0 8px 16px rgba(0,0,0,0.08);
  --shadow-primary: 0 8px 24px rgba(91,94,244,0.35);
  --shadow-correct: 0 6px 20px rgba(16,185,129,0.30);
  --shadow-wrong: 0 6px 20px rgba(244,63,94,0.30);

  /* Border radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 999px;

  /* Transitions */
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Nav */
  --nav-height: 62px;
}

/* ===== Dark mode ===== */
body.dark {
  --bg-page: #080c17;
  --bg-card: #0f1629;
  --bg-nav: rgba(8, 12, 23, 0.88);
  --bg-card-hover: #141929;

  --primary: #818cf8;
  --primary-2: #a78bfa;
  --primary-hover: #6366f1;
  --primary-light: #1e1b4b;
  --primary-glow: rgba(129, 140, 248, 0.2);

  --grad-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  --grad-primary-soft: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(139,92,246,0.10) 100%);
  --grad-hero: linear-gradient(160deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
  --grad-correct: linear-gradient(135deg, #34d399 0%, #10b981 100%);
  --grad-wrong: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%);

  --text-main: #e2e8f0;
  --text-sub: #94a3b8;
  --text-muted: #64748b;

  --border-color: #1e2d52;
  --border-strong: #2d3f72;

  --correct: #34d399;
  --correct-bg: rgba(52, 211, 153, 0.08);
  --correct-border: rgba(52, 211, 153, 0.25);
  --correct-glow: rgba(52,211,153,0.12);

  --wrong: #fb7185;
  --wrong-bg: rgba(251, 113, 133, 0.08);
  --wrong-border: rgba(251, 113, 133, 0.25);
  --wrong-glow: rgba(251,113,133,0.12);

  --warning: #fbbf24;
  --warning-bg: rgba(251, 191, 36, 0.08);
  --warning-border: rgba(251, 191, 36, 0.25);

  --shadow-xs: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px rgba(129,140,248,0.04);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(129,140,248,0.06);
  --shadow-lg: 0 20px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(129,140,248,0.08);
  --shadow-primary: 0 8px 24px rgba(99,102,241,0.4);
  --shadow-correct: 0 6px 20px rgba(52,211,153,0.3);
  --shadow-wrong: 0 6px 20px rgba(251,113,133,0.3);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-main);
  background: var(--bg-page);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color var(--transition-normal), color var(--transition-normal);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* Subtle animated mesh background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(91,94,244,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(124,58,237,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}
body.dark::before {
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(99,102,241,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,0.08) 0%, transparent 55%);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 99px;
}
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ===== Navigation ===== */
.nav {
  background: var(--bg-nav);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border-color);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  height: var(--nav-height);
  padding: 0 28px;
  gap: 16px;
  box-shadow: 0 1px 0 var(--border-color), 0 4px 24px rgba(91,94,244,0.06);
  transition: background-color var(--transition-normal), border-color var(--transition-normal);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
  text-decoration: none;
}
.nav-brand-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--grad-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 4px 12px rgba(91,94,244,0.4);
  flex-shrink: 0;
}
.nav-brand-name {
  font-size: 15px;
  font-weight: 700;
  background: var(--grad-hero);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.nav-tabs {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 4px;
  padding: 5px 6px;
  background: rgba(91,94,244,0.05);
  border-radius: var(--radius-pill);
  border: 1px solid var(--border-color);
}
body.dark .nav-tabs {
  background: rgba(129,140,248,0.06);
}

.nav-item {
  padding: 7px 18px;
  cursor: pointer;
  color: var(--text-sub);
  border-radius: var(--radius-pill);
  transition: all var(--transition-fast);
  font-size: 13.5px;
  font-weight: 500;
  user-select: none;
  white-space: nowrap;
  position: relative;
}
.nav-item:hover {
  color: var(--primary);
  background: var(--primary-light);
}
.nav-item.active {
  background: var(--grad-primary);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 14px rgba(91,94,244,0.35);
}
body.dark .nav-item.active {
  box-shadow: 0 4px 14px rgba(99,102,241,0.45);
}

.theme-toggle-btn {
  background: transparent;
  border: 1px solid var(--border-color);
  cursor: pointer;
  color: var(--text-sub);
  padding: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}
.theme-toggle-btn:hover {
  color: var(--primary);
  background: var(--primary-light);
  border-color: var(--primary);
  transform: rotate(20deg) scale(1.08);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

/* ===== Layout ===== */
.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 36px 24px;
  position: relative;
  z-index: 1;
}

/* ===== Cards ===== */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 28px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-color);
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  transition:
    transform var(--transition-normal),
    box-shadow var(--transition-normal),
    background-color var(--transition-normal),
    border-color var(--transition-normal);
}
.card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--border-strong);
  transform: translateY(-1px);
}

/* Decorative top gradient line on cards */
.card-accent::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--grad-primary);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 9px 20px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-main);
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  font-family: var(--font-sans);
  transition: all var(--transition-fast);
  user-select: none;
  position: relative;
  letter-spacing: 0.01em;
}
.btn:hover:not(:disabled) {
  border-color: var(--border-strong);
  color: var(--primary);
  background: var(--primary-light);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}
.btn:active:not(:disabled) { transform: scale(0.96) translateY(0); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-primary {
  background: var(--grad-primary);
  color: #fff;
  border: none;
  box-shadow: var(--shadow-primary);
  font-weight: 600;
}
.btn-primary::before { display: none; }
.btn-primary:hover:not(:disabled) {
  box-shadow: 0 12px 32px rgba(91,94,244,0.45);
  filter: brightness(1.08);
  color: #fff;
  transform: translateY(-2px);
}

.btn-danger {
  color: var(--wrong);
  border-color: var(--wrong-border);
}
.btn-danger:hover:not(:disabled) {
  background: var(--wrong-bg);
  color: var(--wrong);
  border-color: var(--wrong);
  box-shadow: var(--shadow-wrong);
}
.btn-sm { padding: 6px 14px; font-size: 12.5px; border-radius: var(--radius-sm); }

/* ===== Forms ===== */
.input, .select {
  padding: 10px 14px;
  border: 1.5px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--bg-card);
  color: var(--text-main);
  font-family: var(--font-sans);
  font-size: 14px;
  outline: none;
  transition: all var(--transition-fast);
}
.input:focus, .select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
  background: var(--bg-card);
}

/* ===== Messages ===== */
.msg {
  padding: 13px 18px;
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  font-size: 13.5px;
  font-weight: 500;
  animation: slideInDown 0.3s var(--transition-spring);
  display: flex;
  align-items: center;
  gap: 8px;
}
@keyframes slideInDown {
  from { transform: translateY(-10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.msg-success {
  background: var(--correct-bg);
  border: 1px solid var(--correct-border);
  color: var(--correct);
  box-shadow: 0 4px 12px var(--correct-glow);
}
.msg-error {
  background: var(--wrong-bg);
  border: 1px solid var(--wrong-border);
  color: var(--wrong);
  box-shadow: 0 4px 12px var(--wrong-glow);
}
.msg-info {
  background: var(--primary-light);
  border: 1px solid var(--border-strong);
  color: var(--primary);
  box-shadow: 0 4px 12px var(--primary-glow);
}

/* ===== Option Buttons ===== */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 22px;
}
.options-grid.single-col { grid-template-columns: 1fr; }

.option-btn {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 15px 18px;
  border: 1.5px solid var(--border-color);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition:
    border-color var(--transition-fast),
    background-color var(--transition-fast),
    box-shadow var(--transition-fast),
    transform var(--transition-fast);
  background: var(--bg-card);
  text-align: left;
  font-size: 14px;
  font-weight: 500;
  line-height: 1.55;
  color: var(--text-main);
  position: relative;
  font-family: var(--font-sans);
}
.option-btn:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: var(--shadow-md), 0 0 0 3px var(--primary-glow);
  transform: translateY(-2px);
}
.option-btn:active { transform: scale(0.98) translateY(0); }

.option-btn.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.option-btn.correct {
  border-color: var(--correct);
  background: var(--correct-bg);
  box-shadow: var(--shadow-correct);
}
.option-btn.wrong {
  border-color: var(--wrong);
  background: var(--wrong-bg);
  box-shadow: var(--shadow-wrong);
}

.option-letter {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--bg-page);
  border: 1.5px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  color: var(--text-sub);
  transition: all var(--transition-fast);
  position: relative;
  z-index: 1;
}
.option-btn.selected .option-letter {
  background: var(--grad-primary);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 3px 10px rgba(91,94,244,0.4);
}
.option-btn.correct .option-letter {
  background: var(--grad-correct);
  color: #fff;
  border-color: transparent;
  box-shadow: var(--shadow-correct);
}
.option-btn.wrong .option-letter {
  background: var(--grad-wrong);
  color: #fff;
  border-color: transparent;
  box-shadow: var(--shadow-wrong);
}

/* ===== Chapter list ===== */
.chapter-list { display: flex; flex-direction: column; gap: 8px; }
.chapter-item {
  padding: 14px 18px;
  border: 1.5px solid var(--border-color);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-card);
  color: var(--text-main);
  font-weight: 500;
  font-size: 14px;
}
.chapter-item:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: translateX(5px);
  box-shadow: var(--shadow-sm), -3px 0 0 var(--primary);
}
.chapter-item.active {
  border-color: var(--primary);
  background: var(--primary-light);
  box-shadow: -3px 0 0 var(--primary);
}
.chapter-badge {
  font-size: 12px;
  color: var(--text-sub);
  font-weight: 600;
  background: var(--bg-page);
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border-color);
}

/* ===== Stats ===== */
.stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 20px; }
.stat-item {
  flex: 1 1 140px;
  background: var(--bg-card);
  border: 1.5px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 18px 14px;
  text-align: center;
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}
.stat-item::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--grad-primary);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition-normal);
}
.stat-item:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);
  transform: translateY(-3px);
}
.stat-item:hover::before { transform: scaleX(1); }
.stat-num {
  font-size: 34px;
  font-weight: 800;
  background: var(--grad-hero);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-family: 'Outfit', sans-serif;
  line-height: 1.1;
}
.stat-label {
  font-size: 12px;
  color: var(--text-sub);
  margin-top: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ===== Quiz nav sidebar ===== */
.quiz-nav-sidebar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 0;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
  transition: all var(--transition-normal);
  max-height: 1000px;
  opacity: 1;
  overflow: hidden;
}
.quiz-nav-sidebar.collapsed {
  max-height: 0;
  opacity: 0;
  padding: 0;
  margin-bottom: 0;
  border-bottom-color: transparent;
}
.quiz-nav-dot {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--border-color);
  transition: all var(--transition-fast);
  background: var(--bg-card);
  color: var(--text-sub);
  position: relative;
}
.quiz-nav-dot.flagged {
  border-color: var(--warning);
  background: var(--warning-bg);
  color: var(--warning);
}
.quiz-nav-dot.flagged::after {
  content: '🚩';
  position: absolute;
  top: -6px;
  right: -4px;
  font-size: 10px;
}
.quiz-nav-dot:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: scale(1.1);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.quiz-nav-dot.answered {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
}
.quiz-nav-dot.current {
  background: var(--grad-primary);
  border-color: transparent;
  color: #fff;
  font-weight: 700;
  box-shadow: var(--shadow-primary);
  transform: scale(1.08);
}

/* ===== Quiz header ===== */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.quiz-progress {
  color: var(--text-sub);
  font-size: 13px;
  font-weight: 600;
  background: var(--bg-page);
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border-color);
}

.explanation {

// localforage 降级垫片逻辑，防止 CDN 加载失败报错
if (typeof localforage === 'undefined') {
  console.warn('localforage is not defined. Falling back to localStorage.');
  window.localforage = {
    getItem: function(key) {
      return new Promise((resolve) => {
        try {
          const val = localStorage.getItem(key);
          resolve(val ? JSON.parse(val) : null);
        } catch {
          resolve(null);
        }
      });
    },
    setItem: function(key, val) {
      return new Promise((resolve) => {
        try {
          localStorage.setItem(key, JSON.stringify(val));
        } catch {}
        resolve(val);
      });
    },
    removeItem: function(key) {
      return new Promise((resolve) => {
        try {
          localStorage.removeItem(key);
        } catch {}
        resolve();
      });
    }
  };
}

async function loadData(key) {
  try {
    const val = await localforage.getItem(key);
    return val;
  } catch {
    return null;
  }
}

async function saveData(key, data) {
  try {
    await localforage.setItem(key, data);
  } catch (e) {
    console.error(`Error saving data for ${key}:`, e);
  }
}

function shuffle(arr) {
  const a = [...arr];

    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;

let questionBank = [];
let errorBook = [];
let settings = {};

// 异步加载与历史迁移
async function initData() {
  try {
    let qb = await loadData('questionBank');
    let eb = await loadData('errorBook');
    let setts = await loadData('settings');

    // 如果 IndexedDB 没有数据，且 localStorage 也没有旧数据，则自动加载内置默认题库
    let isNewUser = false;
    if (qb === null && !localStorage.getItem('questionBank')) {
      qb = DEFAULT_QUESTIONS;
      isNewUser = true;
    }

    // 如果 IndexedDB 没有数据，但 localStorage 中有旧数据，则执行无缝迁移
    let migrated = false;
    if (!qb && localStorage.getItem('questionBank')) {
      try {
        qb = JSON.parse(localStorage.getItem('questionBank')) || [];
        migrated = true;
      } catch (e) {}
    }
    if (!eb && localStorage.getItem('errorBook')) {
      try {
        eb = JSON.parse(localStorage.getItem('errorBook')) || [];
        migrated = true;
      } catch (e) {}
    }
    if (!setts && localStorage.getItem('settings')) {
      try {
        setts = JSON.parse(localStorage.getItem('settings')) || {};
        migrated = true;
      } catch (e) {}
    }

    questionBank = qb || [];
    errorBook = eb || [];
    settings = setts || {};

    // 数据库迁移与版本升级：自动载入/合并新版 587 道内置题库
    if (settings.dbVersion !== 'v9') {
      const hasCustomQuestions = questionBank.some(q => !q.id.startsWith('default_'));
      if (!hasCustomQuestions || questionBank.length === 0) {
        questionBank = DEFAULT_QUESTIONS;
      } else {
        const existingKeys = new Set(questionBank.map(q => q.chapter + '|||' + q.question));
        DEFAULT_QUESTIONS.forEach(dq => {
          const key = dq.chapter + '|||' + dq.question;
          if (!existingKeys.has(key)) {
            questionBank.push(dq);
          }
        });
        // 显式修复之前版本中题型分类错误的内置题目
        questionBank.forEach(q => {
          if (q.id === 'bd62ab0878e8' || q.id === 'ffcb5194fcef') {
            q.type = 'multi';
          }
        });
      }
      settings.dbVersion = 'v9';
      migrated = true;
    }

    if (migrated || isNewUser) {
      console.log(isNewUser ? 'Loaded default embedded question bank.' : 'Migrated old localStorage data to IndexedDB.');
      await persist();
    }
  } catch (err) {
    console.error("Failed to initialize data from IndexedDB:", err);
  }
}

async function persist() {
  await saveData('questionBank', questionBank);
  await saveData('errorBook', errorBook);
  await saveData('settings', settings);
}

/* ================================================================
   Excel 导入
   ================================================================ */
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(evt) {
    try {
      showImportMsg('info', '正在解析并保存数据，请稍候...');
      // 允许 UI 渲染提示消息
      await new Promise(resolve => setTimeout(resolve, 50));

      const wb = XLSX.read(evt.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 2) {
        showImportMsg('error', 'Excel 文件为空或格式不正确');
        return;
      }

      const headers = rows[0].map(h => String(h).trim());
      const chapterIdx = headers.findIndex(h => h === '章节');
      const typeIdx = headers.findIndex(h => h === '题型');
      const questionIdx = headers.findIndex(h => h === '题目');
      const answerIdx = headers.findIndex(h => h === '正确答案');
      const explainIdx = headers.findIndex(h => h === '解析');

      // 查找所有选项列（匹配"选项A"到"选项Z"）
      const optionIndices = [];
      headers.forEach((h, i) => {
        const m = h.match(/^选项([A-Z])$/);
        if (m) optionIndices.push(i);
      });

      if (chapterIdx === -1 || typeIdx === -1 || questionIdx === -1 || answerIdx === -1) {
        showImportMsg('error', '缺少必填列：章节、题型、题目、正确答案');
        return;
      }
      if (optionIndices.length < 4) {
        showImportMsg('error', '选项列至少需要4列（选项A~选项D）');
        return;
      }

      let newCount = 0, skipCount = 0;
      // 构建已有题目指纹用于去重
      const existingKeys = new Set(
        questionBank.map(q => q.chapter + '|||' + q.question)
      );

      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        const chapter = String(row[chapterIdx] || '').trim();
        const typeStr = String(row[typeIdx] || '').trim();
        const question = String(row[questionIdx] || '').trim();

        if (!chapter || !typeStr || !question) continue;

        const key = chapter + '|||' + question;
        if (existingKeys.has(key)) { skipCount++; continue; }
        existingKeys.add(key);

        // 收集非空选项
        const options = [];
        const optionMap = {}; // letter -> index
        for (const oi of optionIndices) {
          const val = String(row[oi] || '').trim();
          if (val) {
            const letter = headers[oi].replace('选项', '');
            optionMap[letter] = options.length;
            options.push(val);
          }
        }

        // 解析正确答案
        const answerRaw = String(row[answerIdx] || '').trim().toUpperCase();
        if (!answerRaw) continue;
        const answers = answerRaw.split(/[,，]/).map(s => s.trim()).filter(Boolean);

        const type = (typeStr === '多选') ? 'multi' : 'single';

        // 验证答案有效性
        const validAnswers = answers.filter(a => optionMap.hasOwnProperty(a));
        if (validAnswers.length === 0) continue;

        const qObj = {
          id: genId(),
          chapter,
          type,
          question,
          options,
          answer: validAnswers,
          explanation: explainIdx >= 0 ? String(row[explainIdx] || '').trim() : ''
        };

        questionBank.push(qObj);
        newCount++;
      }

      await persist();
      showImportMsg('success', `导入成功！新增 ${newCount} 题，跳过 ${skipCount} 题（重复或格式问题）`);
      setTimeout(() => renderPage(), 800);
    } catch (err) {
      showImportMsg('error', '解析失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showImportMsg(type, text) {
  const el = $id('importMsg');
  if (el) el.innerHTML = `<div class="msg msg-${type}">${esc(text)}</div>`;
}

function renderChapterList(container) {
  const chapters = getChapters();
  if (chapters.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center; padding:60px 24px;">
        <div style="font-size:48px; margin-bottom:16px">📚</div>
        <p style="color:var(--text-sub); font-size:16px; font-weight:500;">还没有题目，请先到「题库管理」导入题库</p>
      </div>`;
    return;
  }

  // 背题/刷题切换按钮
  const tabClass = currentTab === 'memorize' ? 'active' : '';
  const practiceClass = currentTab === 'practice' ? 'active' : '';

  // 对章节进行二级分组
  const groups = {};
  const groupOrder = [];
  chapters.forEach(ch => {
    const parts = ch.split(' - ');
    const parent = parts[0];
    const sub = parts.length > 1 ? parts.slice(1).join(' - ') : '';
    if (!groups[parent]) {
      groups[parent] = [];
      groupOrder.push(parent);
    }
    groups[parent].push({ fullName: ch, subName: sub || ch });
  });

  const groupsHtml = groupOrder.map((parent, idx) => {
    const subItems = groups[parent];
    let totalQuestions = 0;
    const subItemsHtml = subItems.map(item => {
      const qs = questionBank.filter(q => q.chapter === item.fullName);
      const single = qs.filter(q => q.type === 'single').length;
      const multi = qs.filter(q => q.type === 'multi').length;
      totalQuestions += qs.length;
      return `<div class="chapter-item" data-chapter="${escAttr(item.fullName)}">
        <span>${esc(item.subName)}</span>
        <span class="chapter-badge">单选 ${single} · 多选 ${multi}</span>
      </div>`;
    }).join('');

    // 默认展示全部展开状态（添加 .expanded 类）
    return `<div class="chapter-group expanded" data-group-index="${idx}">
      <div class="chapter-group-header">
        <span class="group-title">📁 ${esc(parent)}</span>
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="chapter-badge" style="font-weight:600; background:var(--primary-light); color:var(--primary); padding:3px 8px; border-radius:12px; font-size:12px;">共 ${totalQuestions} 题</span>
          <span class="group-arrow">▼</span>
        </div>
      </div>
      <div class="chapter-group-content">
        ${subItemsHtml}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px;">
      <h2 style="font-size:20px; font-weight:700;">章节列表</h2>
      <div class="segmented-control">
        <div class="segment-btn ${practiceClass}" id="btnTabPractice">刷题模式</div>
        <div class="segment-btn ${tabClass}" id="btnTabMemorize">背题模式</div>
      </div>
    </div>
    <div class="chapter-list" id="chapterList">
      ${groupsHtml}
    </div>
  `;

  $id('btnTabPractice').addEventListener('click', () => { currentTab = 'practice'; renderPage(); });
  $id('btnTabMemorize').addEventListener('click', () => { currentTab = 'memorize'; renderPage(); });
  $id('chapterList').addEventListener('click', function(e) {
    // 1. 判断是否点击了子章节项
    const item = e.target.closest('.chapter-item');
    if (item) {
      const chapter = item.dataset.chapter;
      const questions = questionBank.filter(q => q.chapter === chapter);
      if (currentTab === 'memorize') {
        startMemorize(questions, chapter);
      } else {
        showPracticeConfigModal(questions, chapter);
      }
      return;
    }

    // 2. 判断是否点击了一级分类头部，实现收起/展开折叠栏
    const header = e.target.closest('.chapter-group-header');
    if (header) {
      const group = header.closest('.chapter-group');
      if (group) {
        group.classList.toggle('expanded');
      }
    }
  });
}

        </div>
        
        <div style="color: var(--text-sub); font-size: 13px; margin-bottom: 16px; font-weight: 600;">
          本次共选择：<span id="rangeCountText" style="color: var(--primary); font-size: 16px; font-weight: 700;">${total}</span> 道题（章节总共 ${total} 题）
        </div>

        <div style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px;">
          ${quickButtonsHtml}
        </div>
      </div>

      <div class="modal-footer" style="margin-top: 24px;">
        <button class="btn" id="btnPracticeCancel">取消</button>
        <button class="btn btn-primary" id="btnPracticeStart">开始刷题</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  const startInput = overlay.querySelector('#practiceStartInput');
  const endInput = overlay.querySelector('#practiceEndInput');
  const countText = overlay.querySelector('#rangeCountText');

  function updateRangeCount() {
    const start = parseInt(startInput.value);
    const end = parseInt(endInput.value);
    if (!isNaN(start) && !isNaN(end) && start >= 1 && end >= start && end <= total) {
      countText.textContent = end - start + 1;
    } else {
      countText.textContent = '--';
    }
  }

  startInput.addEventListener('input', updateRangeCount);
  endInput.addEventListener('input', updateRangeCount);

  overlay.querySelector('#btnPracticeCancel').addEventListener('click', () => { overlay.remove(); });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  // 快捷选择事件绑定
  overlay.querySelectorAll('.btn-range-quick').forEach(btn => {
    btn.addEventListener('click', function() {
      startInput.value = this.dataset.start;
      endInput.value = this.dataset.end;
      updateRangeCount();
    });
  });

  overlay.querySelector('#btnPracticeStart').addEventListener('click', () => {
    const start = parseInt(startInput.value);
    const end = parseInt(endInput.value);
    if (isNaN(start) || isNaN(end) || start < 1 || end < start || end > total) {
      alert(`请输入有效的刷题范围！范围必须在 1 到 ${total} 之间，且结束题数不能小于起始题数。`);
      return;
    }
    overlay.remove();
    // 按顺序从题库中把这部分题切出来（1-indexed 转为 0-indexed slice）
    const selectedQuestions = questions.slice(start - 1, end);
    // 题目顺序与选项顺序仍然进行打乱
    startQuiz(selectedQuestions, chapter);
  });
}

/* ================================================================
   刷题模式（全部答完统一判分）
   ================================================================ */
let quizState = null;

function startQuiz(questions, chapter, limit = null) {
  // 随机打乱题目顺序
  const shuffledQuestions = shuffle(questions);
  // 如果设定了数量限制，截取前面的题目
  const selectedQuestions = limit ? shuffledQuestions.slice(0, limit) : shuffledQuestions;
  // 预生成每道题的随机选项顺序（保证前后翻页选项位置不变）
  // 字母始终按显示位置重新编排：第一个位置就是A，第二个就是B...
  const prepared = selectedQuestions.map(q => {
    const mapped = q.options.map((text, i) => ({ text, originalLetter: String.fromCharCode(65 + i) }));
    const shuffled = shuffle(mapped);
    const letterMap = {}; // 显示字母 → 原始字母
    const displayOptions = shuffled.map((item, i) => {
      const displayLetter = String.fromCharCode(65 + i);
      letterMap[displayLetter] = item.originalLetter;
      return { text: item.text, letter: displayLetter };
    });
    return { ...q, displayOptions, letterMap };
  });

  quizState = {
    questions: prepared,
    answers: new Array(prepared.length).fill(null), // 每题存储选中的字母数组，null=未答
    currentIndex: 0,
    chapter: chapter,
    mode: 'practice',
    submitted: false,
    navCollapsed: false,
    flagged: []
  };
  renderQuizCard();
}

function renderQuizCard() {
  const total = quizState.questions.length;
  const idx = quizState.currentIndex;
  const q = quizState.questions[idx];
  const isMulti = q.type === 'multi';
  const gridClass = q.displayOptions.length > 4 ? 'single-col' : '';
  const selected = quizState.answers[idx] || [];
  const answeredCount = quizState.answers.filter(a => a !== null && a.length > 0).length;

  const isFlagged = quizState.flagged.includes(q.id);

  // 题目导航按钮
  let navHtml = `<div class="quiz-nav-sidebar ${quizState.navCollapsed ? 'collapsed' : ''}" id="quizNavSidebar">`;
  for (let i = 0; i < total; i++) {
    const qId = quizState.questions[i].id;
    const isQFlagged = quizState.flagged.includes(qId);
    const cls = [
      i === idx ? 'current' : '',
      quizState.answers[i] && quizState.answers[i].length > 0 ? 'answered' : '',
      isQFlagged ? 'flagged' : ''
    ].filter(Boolean).join(' ');
    navHtml += `<span class="quiz-nav-dot ${cls}" data-idx="${i}">${i + 1}</span>`;
  }
  navHtml += '</div>';

  $id('container').innerHTML = `
    <div class="card">
      <div class="quiz-header">
        <span class="tag ${q.type === 'multi' ? 'tag-multi' : 'tag-single'}">${q.type === 'multi' ? '多选题' : '单选题'}</span>
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="quiz-progress">第 ${idx + 1} 题 / 共 ${total} 题 · 已答 ${answeredCount} 题</span>
          <button class="btn btn-sm" id="btnToggleFlag" style="padding: 4px 10px; font-size: 12px; font-weight: 600; border-color: ${isFlagged ? 'var(--warning)' : 'var(--border-color)'}; color: ${isFlagged ? 'var(--warning)' : 'var(--text-sub)'}; background: ${isFlagged ? 'var(--warning-bg)' : 'transparent'};">
            ${isFlagged ? '🚩 已标记' : '🏳️ 标记此题'}
          </button>
          <button class="btn btn-sm" id="btnToggleNav" style="padding: 4px 10px; font-size: 12px; font-weight: 600; border-color: var(--primary); color: var(--primary);">${quizState.navCollapsed ? '展开题号' : '收起题号'}</button>
        </div>
      </div>

      ${navHtml}

      <div class="question-row">
        <div class="question-num ${(idx + 1) >= 100 ? 'num-lg' : ''}">${idx + 1}</div>
        <div class="question-text">${esc(q.question)}</div>
      </div>

      <div class="options-grid ${gridClass}" id="optionsGrid">
        ${q.displayOptions.map(opt => `
          <div class="option-btn ${selected.includes(opt.letter) ? 'selected' : ''}" data-letter="${opt.letter}">
            <span class="option-letter">${opt.letter}</span>
            <span>${esc(opt.text)}</span>
          </div>
        `).join('')}
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px">
        <button class="btn" id="btnPrev" ${idx === 0 ? 'disabled' : ''}>上一题</button>
        <span style="color:var(--text-sub); font-size:13px; font-weight:500;">${isMulti ? '点击选项可切换选中/取消' : '点击选项选中答案'}</span>
        ${idx < total - 1
          ? '<button class="btn btn-primary" id="btnNext">下一题</button>'
          : '<button class="btn btn-primary" id="btnSubmit">交卷</button>'
        }
      </div>
    </div>
  `;

  // 处理选项点击
  const grid = $id('optionsGrid');
  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.option-btn');
    if (!btn) return;
    const letter = btn.dataset.letter;

    if (isMulti) {
      let sel = quizState.answers[idx] || [];
      if (sel.includes(letter)) {
        sel = sel.filter(l => l !== letter);
      } else {
        sel = [...sel, letter];
      }
      quizState.answers[idx] = sel.length > 0 ? sel : null;
      btn.classList.toggle('selected');
    } else {
      quizState.answers[idx] = [letter];
      // 单选题：选中后自动跳下一题（最后一题停留让用户交卷）
      if (idx < quizState.questions.length - 1) {
        quizState.currentIndex++;
      }
      renderQuizCard();
    }
  });

  // 题目导航点击
  document.querySelectorAll('.quiz-nav-dot').forEach(dot => {
    dot.addEventListener('click', function() {
      quizState.currentIndex = parseInt(this.dataset.idx);
      renderQuizCard();
    });
  });

  $id('btnToggleNav').addEventListener('click', () => {
    const nav = $id('quizNavSidebar');
    const btn = $id('btnToggleNav');
    if (nav && btn) {
      const isCollapsed = nav.classList.toggle('collapsed');
      quizState.navCollapsed = isCollapsed;
      btn.textContent = isCollapsed ? '展开题号' : '收起题号';
    }
  });

  $id('btnToggleFlag').addEventListener('click', () => {
    const qId = q.id;
    const idxInFlagged = quizState.flagged.indexOf(qId);
    if (idxInFlagged > -1) {
      quizState.flagged.splice(idxInFlagged, 1);
    } else {
      quizState.flagged.push(qId);
    }
    renderQuizCard();
  });

  $id('btnPrev').addEventListener('click', () => { quizState.currentIndex--; renderQuizCard(); });
  if (idx < total - 1) {
    $id('btnNext').addEventListener('click', () => { quizState.currentIndex++; renderQuizCard(); });
  } else {
    $id('btnSubmit').addEventListener('click', () => {
      const unanswered = quizState.answers.filter(a => !a || a.length === 0).length;
      let msg = '确定要交卷吗？';
      if (unanswered > 0) msg += `\n还有 ${unanswered} 题未作答，交卷后未答题将计为错误。`;
      if (confirm(msg)) submitQuiz();
    });
  }
}

function submitQuiz() {
  quizState.submitted = true;
  let correct = 0, wrong = 0;
  const results = quizState.questions.map((q, i) => {
    const userDisplayLetters = quizState.answers[i] || [];
    // 将显示字母转为原始字母，再与正确答案对比
    const userAnswer = userDisplayLetters.map(l => q.letterMap ? q.letterMap[l] : l);
    const sortedUser = [...userAnswer].sort();
    const sortedCorrect = [...q.answer].sort();
    const isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
    if (isCorrect) { correct++; } else { wrong++; addToErrorBook(q.id); }
    return { ...q, userAnswer, isCorrect, userDisplayLetters };
  });

  quizState.correct = correct;
  quizState.wrong = wrong;
  quizState.results = results;

  showQuizResult(results);
}

function showQuizResult(results) {
  const total = results.length;
  const correct = quizState.correct;
  const wrong = quizState.wrong;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;

  let singleScore = 0;
  let multiScore = 0;
  let earnedScore = 0;
  let scoreHtml = '';

  const isExam = quizState.chapter === '模拟考试';

  if (isExam) {
    const S = results.filter(q => q.type === 'single').length;
    const M = results.filter(q => q.type === 'multi').length;
    const totalCount = S + M;
    if (totalCount > 0) {
      singleScore = 100 / totalCount;
      multiScore = singleScore; // 1:1 ratio
    }
    results.forEach(r => {
      if (r.isCorrect) {
        earnedScore += singleScore;
      }
    });

    const displayEarned = Math.round(earnedScore * 10) / 10;
    const displaySingle = Math.round(singleScore * 100) / 100;

    scoreHtml = `
      <div class="card" style="text-align:center; background: linear-gradient(135deg, var(--primary-light), var(--bg-card)); border-color: var(--primary); margin-bottom:20px;">
        <h3 style="font-size:16px; font-weight:600; color:var(--primary); margin-bottom:8px;">模拟考试得分</h3>
        <div style="font-size:54px; font-weight:800; color:var(--primary); font-family:'Outfit', sans-serif;">
          ${displayEarned} <span style="font-size:18px; font-weight:500; color:var(--text-sub);">/ 100 分</span>
        </div>
        <p style="font-size:12px; color:var(--text-sub); margin-top:8px; font-weight:500;">
          分值均等分配（1:1）：每题 ${displaySingle} 分
        </p>
      </div>
    `;
  }

  const wrongResults = results.filter(r => !r.isCorrect);
  let detailHtml = '';
  if (wrongResults.length === 0) {
    detailHtml = '<div style="text-align:center; padding:32px 0; color:var(--correct); font-weight:600; font-size:15px;">🎉 太棒了！本轮练习全部答对，没有错题！</div>';
  } else {
    detailHtml = wrongResults.map(r => {
      const idx = results.indexOf(r);
      const reverseMap = {};
      if (r.letterMap) {
        for (const [dl, ol] of Object.entries(r.letterMap)) { reverseMap[ol] = dl; }
      }
      const correctDisplay = r.answer.map(a => reverseMap[a] || a).sort().join(', ');
      const userDisplay = (r.userDisplayLetters && r.userDisplayLetters.length > 0)
        ? r.userDisplayLetters.sort().join(', ') : '未作答';
      const statusIcon = '❌';
      const statusColor = 'var(--wrong)';
      const itemClass = 'wrong-item';

      // 选项列表（标注正确答案和用户选择）
      const optionsDetail = r.displayOptions.map(opt => {
        const isCorrectOpt = r.answer.includes(r.letterMap ? r.letterMap[opt.letter] || opt.letter : opt.letter);
        const isUserPick = (r.userDisplayLetters || []).includes(opt.letter);
        let cls = '';
        if (isCorrectOpt && isUserPick) cls = 'correct';
        else if (isUserPick && !isCorrectOpt) cls = 'wrong';
        else if (isCorrectOpt) cls = 'correct';
        return `<span class="result-opt ${cls}">${opt.letter}. ${esc(opt.text)}</span>`;
      }).join(' ');

      const qScore = (r.type === 'single') ? singleScore : multiScore;
      const displayQScore = Math.round(qScore * 100) / 100;
      const scoreHint = isExam ? ` <span style="font-size:11px; color:var(--text-sub); font-weight:normal;">(分值: ${displayQScore}分)</span>` : '';

      const isQFlagged = quizState.flagged.includes(r.id);
      const flagBadge = isQFlagged ? ' <span style="font-size:12px; color:var(--warning);" title="答题中标记过">🚩</span>' : '';

      return `
        <div class="result-item collapsed ${itemClass}" data-idx="${idx}">
          <div class="result-summary" style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
            <span style="flex:1; min-width:0;">
              <strong>${statusIcon} ${idx + 1}.</strong>
              <span class="tag ${r.type === 'multi' ? 'tag-multi' : 'tag-single'}" style="margin:0 4px;">${r.type === 'multi' ? '多选' : '单选'}</span>
              <span style="color:var(--text-main); font-weight:500;">${esc(r.question)}</span>${flagBadge}${scoreHint}
            </span>
            <span style="flex-shrink:0; font-size:13px; font-weight:600; color:${statusColor};">✗ ${userDisplay}</span>
            <span class="result-arrow" style="flex-shrink:0; font-size:12px; color:var(--text-sub); transition:transform 0.2s;">▶</span>
          </div>
          <div class="result-detail" style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border-color); font-size:13px; color:var(--text-sub);">
            <div style="margin-bottom:8px;"><strong>选项：</strong>${optionsDetail}</div>
            <div style="margin-bottom:6px; color:var(--text-main);">你的答案：<strong style="color:${statusColor}">${userDisplay}</strong></div>
            <div style="margin-bottom:6px; color:var(--text-main);">正确答案：<strong style="color:var(--correct)">${correctDisplay}</strong></div>
            ${r.explanation ? `<div class="explanation" style="margin-top:8px"><strong>解析：</strong>${esc(r.explanation)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  $id('container').innerHTML = `
    ${scoreHtml}
    <div class="card" style="text-align:center">
      <div style="font-size:48px; margin-bottom:16px">${pct >= 60 ? '🎉' : '💪'}</div>
      <h2 style="font-size:22px; font-weight:700;">${quizState.chapter} · 答题结果</h2>
      <div class="stats-row" style="justify-content:center; margin:24px 0">
        <div class="stat-item">
          <div class="stat-num">${total}</div>
          <div class="stat-label">总题数</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--correct)">${correct}</div>
          <div class="stat-label">正确</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:var(--wrong)">${wrong}</div>
          <div class="stat-label">错误</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${pct}%</div>
          <div class="stat-label">正确率</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:18px; font-weight:700; margin-bottom:16px">答题详情</h3>
      ${detailHtml}
    </div>

    <div style="text-align:center; margin-top:20px;">
      <button class="btn btn-primary" id="btnBack">返回章节列表</button>
    </div>
  `;
  $id('btnBack').addEventListener('click', () => { currentPage = 'practice'; renderPage(); });
}

/* ================================================================
   背题模式
   ================================================================ */
let memorizeState = null;

function startMemorize(questions, chapter) {
  memorizeState = {
    questions: questions,
    currentIndex: 0,
    chapter: chapter,
    navCollapsed: false
  };
  renderMemorizeCard();
}

function renderMemorizeCard() {
  const total = memorizeState.questions.length;
  const idx = memorizeState.currentIndex;
  if (idx >= total) {
    $id('container').innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:48px; margin-bottom:16px">✅</div>
        <h2>本章题目已全部浏览完毕</h2>
        <p style="color:var(--text-sub); margin-top:8px">共 ${total} 题</p>
        <button class="btn btn-primary" id="btnBack" style="margin-top:16px">返回章节列表</button>
      </div>`;
    $id('btnBack').addEventListener('click', () => { currentPage = 'practice'; renderPage(); });
    return;
  }

  const q = memorizeState.questions[idx];

  // 题目导航按钮
  let navHtml = `<div class="quiz-nav-sidebar ${memorizeState.navCollapsed ? 'collapsed' : ''}" id="memorizeNavSidebar">`;
  for (let i = 0; i < total; i++) {
    const cls = i === idx ? 'current' : '';
    navHtml += `<span class="quiz-nav-dot ${cls}" data-idx="${i}">${i + 1}</span>`;
  }
  navHtml += '</div>';

  $id('container').innerHTML = `
    <div class="card">
      <div class="quiz-header">
        <span class="tag tag-multi">背题模式</span>
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="quiz-progress">第 ${idx + 1} 题 / 共 ${total} 题</span>
          <button class="btn btn-sm" id="btnToggleMemorizeNav" style="padding: 4px 10px; font-size: 12px; font-weight: 600; border-color: var(--primary); color: var(--primary);">${memorizeState.navCollapsed ? '展开题号' : '收起题号'}</button>
        </div>
      </div>

      ${navHtml}

      <div class="question-row">
        <div class="question-num ${(idx + 1) >= 100 ? 'num-lg' : ''}">${idx + 1}</div>
        <div class="question-text">${esc(q.question)}</div>
      </div>

      <div class="options-grid">
        ${q.options.map((opt, i) => {
          const letter = String.fromCharCode(65 + i);
          const isAnswer = q.answer.includes(letter);
          return `<div class="option-btn ${isAnswer ? 'correct' : ''}" style="pointer-events:none; cursor:default;">
            <span class="option-letter">${letter}</span>
            <span>${esc(opt)}</span>
          </div>`;
        }).join('')}
      </div>

      ${q.explanation ? `<div class="explanation" style="margin-top:12px"><strong>解析：</strong>${esc(q.explanation)}</div>` : ''}

      <div style="display:flex; justify-content:space-between; margin-top:16px">
        <button class="btn" id="btnPrev" ${idx === 0 ? 'disabled' : ''}>上一题</button>
        <button class="btn btn-primary" id="btnNext">${idx + 1 >= total ? '完成浏览' : '下一题'}</button>
      </div>
    </div>
  `;

  // 绑定事件
  document.querySelectorAll('.quiz-nav-dot').forEach(dot => {
    dot.addEventListener('click', function() {
      memorizeState.currentIndex = parseInt(this.dataset.idx);
      renderMemorizeCard();
    });
  });

  $id('btnToggleMemorizeNav').addEventListener('click', () => {
    const nav = $id('memorizeNavSidebar');
    const btn = $id('btnToggleMemorizeNav');
    if (nav && btn) {
      const isCollapsed = nav.classList.toggle('collapsed');
      memorizeState.navCollapsed = isCollapsed;
      btn.textContent = isCollapsed ? '展开题号' : '收起题号';
    }
  });

  $id('btnPrev').addEventListener('click', () => { memorizeState.currentIndex--; renderMemorizeCard(); });
  $id('btnNext').addEventListener('click', () => { memorizeState.currentIndex++; renderMemorizeCard(); });
}

/* ================================================================
   错题集
   ================================================================ */
function renderErrorBook(container) {
  // 清理无关联题目的无效错题记录
  const before = errorBook.length;
  errorBook = errorBook.filter(e => questionBank.some(q => q.id === e.questionId));
  if (errorBook.length !== before) persist();

  if (errorBook.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center; padding:60px 24px;">
        <div style="font-size:48px; margin-bottom:16px">📝</div>
        <p style="color:var(--text-sub); font-size:16px;">错题集为空，继续加油！</p>
      </div>`;
    return;
  }

  const chapters = [...new Set(
    errorBook.map(e => {
      const q = questionBank.find(q => q.id === e.questionId);
      return q ? q.chapter : '(已删除)';
    })
  )];

  const filterHtml = `
    <select class="select" id="errorFilter">
      <option value="all">全部章节</option>
      ${chapters.map(ch => `<option value="${escAttr(ch)}">${esc(ch)}</option>`).join('')}
    </select>
    <button class="btn btn-primary btn-sm" id="btnRetryAll" style="margin-left:12px">重新练习全部</button>
  `;

  container.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px">
        <h2 style="font-size:20px; font-weight:700;">错题集 · ${errorBook.length} 题</h2>
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">${filterHtml}</div>
      </div>
      <div id="errorList"></div>
    </div>
  `;

  function renderList(filter = 'all') {
    const list = $id('errorList');
    const filtered = errorBook.filter(e => {
      const q = questionBank.find(q => q.id === e.questionId);
      if (!q) return false;
      if (filter !== 'all' && q.chapter !== filter) return false;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<p style="color:var(--text-sub); text-align:center; padding:20px">该章节暂无错题</p>';
      return;
    }

    list.innerHTML = filtered.map(e => {
      const q = questionBank.find(q => q.id === e.questionId);
      if (!q) return '';
      const answerStr = q.answer.join(', ');

      // 生成选项列表（标注正确答案）
      const optionsDetail = q.options.map((opt, idx) => {
        const letter = String.fromCharCode(65 + idx);
        const isCorrectOpt = q.answer.includes(letter);
        let cls = isCorrectOpt ? 'correct' : '';
        return `<span class="result-opt ${cls}">${letter}. ${esc(opt)}</span>`;
      }).join(' ');

      return `<div class="error-item collapsed" style="display:flex; flex-direction:column; gap:8px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
          <span style="font-weight:600; line-height:1.5;">${esc(q.question)}</span>
          <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
            <span class="tag tag-multi">错误 ${e.wrongCount} 次</span>
            <span class="result-arrow" style="font-size:12px; color:var(--text-sub); transition:transform 0.2s;">▶</span>
          </div>
        </div>
        <div style="font-size:13px; color:var(--text-sub); font-weight:500;">
          正确答案：<strong style="color:var(--correct)">${answerStr}</strong> · 章节：${esc(q.chapter)}
          <button class="btn btn-sm btn-danger" style="margin-left:8px; padding:3px 8px; font-size:11px;" data-id="${q.id}" data-action="remove">移除</button>
        </div>
        <div class="error-detail" style="margin-top:8px; padding-top:12px; border-top:1px solid var(--border-color); font-size:13px; color:var(--text-sub);">
          <div style="margin-bottom:8px;"><strong>选项：</strong>${optionsDetail}</div>
          ${q.explanation ? `<div class="explanation" style="margin-top:8px"><strong>解析：</strong>${esc(q.explanation)}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    // 移除按钮事件
    list.querySelectorAll('[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', async function() {
        errorBook = errorBook.filter(e => e.questionId !== this.dataset.id);
        await persist();
        renderList($id('errorFilter').value);
      });
    });
  }

  renderList();
  $id('errorFilter').addEventListener('change', function() { renderList(this.value); });
  $id('btnRetryAll').addEventListener('click', () => {
    const ids = errorBook.map(e => e.questionId);
    const questions = ids.map(id => questionBank.find(q => q.id === id)).filter(Boolean);
    if (questions.length === 0) { alert('没有可练习的错题'); return; }
    startQuiz(questions, '错题重练');
  });
}

/* ================================================================
   模拟考试
   ================================================================ */
function renderExamConfig(container) {
  const chapters = getChapters();
  if (chapters.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center; padding:60px 24px;">
        <p style="color:var(--text-sub); font-size:16px;">还没有题目，请先到「题库管理」导入题库</p>
      </div>`;
    return;
  }

  const totalSingle = questionBank.filter(q => q.type === 'single').length;
  const totalMulti = questionBank.filter(q => q.type === 'multi').length;

  container.innerHTML = `
    <div class="card">
      <h2 style="font-size:20px; font-weight:700; margin-bottom:20px;">模拟考试配置</h2>

      <div style="margin-bottom:24px">
        <p style="margin-bottom:12px; font-weight:600">选择章节：</p>
        <div id="examChapters" style="display:flex; flex-wrap:wrap; gap:10px">
          ${chapters.map(ch => {
            const single = questionBank.filter(q => q.chapter === ch && q.type === 'single').length;
            const multi = questionBank.filter(q => q.chapter === ch && q.type === 'multi').length;
            return `<label class="exam-chapter-label">
              <input type="checkbox" value="${escAttr(ch)}" class="exam-chk" checked>
              <span>${esc(ch)}</span> <span class="chapter-badge" style="margin-left:6px; font-size:11px;">(单${single}/多${multi})</span>
            </label>`;
          }).join('')}
        </div>
        <div style="margin-top:12px; display:flex; gap:8px;">
          <button class="btn btn-sm" id="btnSelectAll">全选</button>
          <button class="btn btn-sm" id="btnDeselectAll">取消全选</button>
        </div>
      </div>

      <div style="display:flex; gap:24px; margin-bottom:24px; flex-wrap:wrap">
        <div>
          <label style="font-weight:600; margin-right:8px;">单选题数：</label>
          <input type="number" class="input" id="examSingleCount" value="${Math.min(10, totalSingle)}" min="0" max="${totalSingle}" style="width:100px">
        </div>
        <div>
          <label style="font-weight:600; margin-right:8px;">多选题数：</label>
          <input type="number" class="input" id="examMultiCount" value="${Math.min(5, totalMulti)}" min="0" max="${totalMulti}" style="width:100px">
        </div>
      </div>

      <p style="color:var(--text-sub); font-size:13px; margin-bottom:20px; font-weight:500;">
        题库共有：单选 <strong>${totalSingle}</strong> 题 · 多选 <strong>${totalMulti}</strong> 题
        <span id="availableHint"></span>
      </p>

      <button class="btn btn-primary" id="btnStartExam">开始考试</button>
    </div>
  `;

  function updateHint() {
    const selectedChs = [...document.querySelectorAll('.exam-chk:checked')].map(cb => cb.value);
    const availSingle = questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'single').length;
    const availMulti = questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'multi').length;
    const hint = $id('availableHint');
    if (hint) hint.textContent = ` · 已选章节可用：单选 ${availSingle} 题 · 多选 ${availMulti} 题`;
  }

  updateHint();
  document.getElementById('examChapters').addEventListener('change', updateHint);
  $id('btnSelectAll').addEventListener('click', () => {
    document.querySelectorAll('.exam-chk').forEach(cb => cb.checked = true);
    updateHint();
  });
  $id('btnDeselectAll').addEventListener('click', () => {
    document.querySelectorAll('.exam-chk').forEach(cb => cb.checked = false);
    updateHint();
  });

  $id('btnStartExam').addEventListener('click', () => {
    const selectedChs = [...document.querySelectorAll('.exam-chk:checked')].map(cb => cb.value);
    if (selectedChs.length === 0) { alert('请至少选择一个章节'); return; }

    const singleCount = parseInt($id('examSingleCount').value) || 0;
    const multiCount = parseInt($id('examMultiCount').value) || 0;
    if (singleCount === 0 && multiCount === 0) { alert('请至少设置一种题型的数量'); return; }

    const poolSingle = shuffle(questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'single'));
    const poolMulti = shuffle(questionBank.filter(q => selectedChs.includes(q.chapter) && q.type === 'multi'));

    if (singleCount > poolSingle.length) {
      alert(`单选题不足！需要 ${singleCount} 题，但只有 ${poolSingle.length} 题可用`);
      return;
    }
    if (multiCount > poolMulti.length) {
      alert(`多选题不足！需要 ${multiCount} 题，但只有 ${poolMulti.length} 题可用`);
      return;
    }

    const examQuestions = shuffle([
      ...poolSingle.slice(0, singleCount),
      ...poolMulti.slice(0, multiCount)
    ]);

    startQuiz(examQuestions, '模拟考试');
  });
}

/* ================================================================
   工具函数
   ================================================================ */
function countValidErrors() {
  return errorBook.filter(e => questionBank.some(q => q.id === e.questionId)).length;
}

function getChapters() {
  return [...new Set(questionBank.map(q => q.chapter))].sort();
}

function addToErrorBook(questionId) {
  const entry = errorBook.find(e => e.questionId === questionId);
  if (entry) {
    entry.wrongCount++;
    entry.lastWrong = new Date().toISOString().slice(0, 10);
  } else {
    errorBook.push({
      questionId,
      wrongCount: 1,
      lastWrong: new Date().toISOString().slice(0, 10)
    });
  }
  persist();
}

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 主题切换与初始化函数
function initTheme() {
  const btn = $id('themeToggleBtn');
  if (!btn) return;
  
  let theme = settings.theme;
  if (!theme) {
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  
  applyTheme(theme);
  
  btn.addEventListener('click', async () => {
    const currentTheme = document.body.classList.contains('dark') ? 'dark' : 'light';
    const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme(nextTheme);
    settings.theme = nextTheme;
    await persist();
  });
}

function applyTheme(theme) {
  const btn = $id('themeToggleBtn');
  if (!btn) return;
  if (theme === 'dark') {
    document.body.classList.add('dark');
    btn.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    `;
    btn.setAttribute('title', '切换至亮色模式');
  } else {
    document.body.classList.remove('dark');
    btn.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    `;
    btn.setAttribute('title', '切换至暗色模式');
  }
}

// 全局事件委托：答题结果与错题展开/收起
$id('container').addEventListener('click', function(e) {
  // 1. 处理答题结果卡片展开/收起
  const resultItem = e.target.closest('.result-item');
  if (resultItem) {
    resultItem.classList.toggle('expanded');
    return;
  }
  
  // 2. 处理错题卡片展开/收起（排除点击“移除”按钮）
  const errorItem = e.target.closest('.error-item');
  if (errorItem && !e.target.closest('button')) {
    errorItem.classList.toggle('expanded');
    return;
  }
});

// 异步启动入口
async function initApp() {
  await initData();
  initTheme();
  renderPage();
}

initApp();
